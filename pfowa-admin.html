<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PFOWA – Admin Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1a2e; --gold: #c9a84c; --gold-light: #e8d5a3;
    --cream: #faf8f3; --cream-dark: #f0ece0; --muted: #7a7060;
    --accent: #2d5a3d; --error: #c0392b; --white: #ffffff;
    --border: #d5c9b0; --shadow: 0 4px 24px rgba(26,26,46,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--cream); font-family: 'DM Sans', sans-serif; color: var(--ink); min-height: 100vh; }

  .lock-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--ink); position: relative; overflow: hidden; }
  .lock-screen::before { content: ''; position: absolute; inset: 0; background: repeating-linear-gradient(45deg,transparent,transparent 40px,rgba(201,168,76,0.04) 40px,rgba(201,168,76,0.04) 41px); }
  .lock-card { background: rgba(255,255,255,0.04); border: 1px solid rgba(201,168,76,0.25); border-radius: 16px; padding: 48px 44px; width: 100%; max-width: 400px; position: relative; text-align: center; }
  .lock-logo { width: 88px; height: 88px; border-radius: 50%; object-fit: cover; border: 2px solid rgba(201,168,76,0.4); margin: 0 auto 20px; display: block; }
  .lock-title { font-family: 'Cormorant Garamond', serif; font-size: 26px; font-weight: 600; color: var(--white); margin-bottom: 4px; }
  .lock-sub { font-size: 13px; color: rgba(255,255,255,0.45); margin-bottom: 32px; }
  .lock-label { display: block; text-align: left; font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: rgba(255,255,255,0.4); margin-bottom: 8px; }
  .lock-input { width: 100%; padding: 13px 16px; background: rgba(255,255,255,0.06); border: 1.5px solid rgba(201,168,76,0.2); border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 16px; color: var(--white); outline: none; letter-spacing: 0.1em; transition: border-color 0.2s; text-align: center; }
  .lock-input:focus { border-color: var(--gold); }
  .lock-input.shake { animation: shake 0.4s ease; border-color: var(--error) !important; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-8px)} 40%{transform:translateX(8px)} 60%{transform:translateX(-5px)} 80%{transform:translateX(5px)} }
  .lock-btn { width: 100%; margin-top: 16px; padding: 14px; background: var(--gold); color: var(--ink); border: none; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; transition: opacity 0.2s; }
  .lock-btn:hover { opacity: 0.88; }
  .lock-error { font-size: 13px; color: #e57373; margin-top: 12px; display: none; }
  .lock-error.show { display: block; }
  .lock-attempts { font-size: 12px; color: rgba(255,255,255,0.25); margin-top: 20px; }

  .dashboard { display: none; }
  .dashboard.show { display: block; }

  .header { background: var(--ink); position: relative; overflow: hidden; }
  .header::before { content: ''; position: absolute; inset: 0; background: repeating-linear-gradient(45deg,transparent,transparent 40px,rgba(201,168,76,0.04) 40px,rgba(201,168,76,0.04) 41px); }
  .header-inner { max-width: 1100px; margin: 0 auto; padding: 28px 32px; position: relative; display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
  .header-left { display: flex; align-items: center; gap: 16px; }
  .logo-img { width: 56px; height: 56px; border-radius: 50%; object-fit: cover; border: 2px solid rgba(255,255,255,0.15); flex-shrink: 0; }
  .admin-badge { display: inline-block; background: var(--gold); color: var(--ink); font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; padding: 2px 8px; border-radius: 4px; margin-bottom: 4px; }
  .header-title { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 600; color: var(--white); }
  .header-right { display: flex; gap: 10px; align-items: center; }
  .btn-refresh { padding: 9px 16px; background: rgba(201,168,76,0.15); color: var(--gold); border: 1px solid rgba(201,168,76,0.3); border-radius: 7px; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
  .btn-refresh:hover { background: rgba(201,168,76,0.25); }
  .btn-logout { padding: 9px 16px; background: transparent; color: rgba(255,255,255,0.5); border: 1px solid rgba(255,255,255,0.15); border-radius: 7px; font-family: 'DM Sans', sans-serif; font-size: 13px; cursor: pointer; transition: all 0.2s; }
  .btn-logout:hover { color: var(--white); border-color: rgba(255,255,255,0.4); }

  .stats-bar { background: var(--white); border-bottom: 1px solid var(--border); box-shadow: var(--shadow); }
  .stats-inner { max-width: 1100px; margin: 0 auto; padding: 16px 32px; display: flex; gap: 32px; flex-wrap: wrap; align-items: center; }
  .stat { display: flex; align-items: baseline; gap: 6px; }
  .stat-num { font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 700; color: var(--ink); }
  .stat-label { font-size: 12px; color: var(--muted); font-weight: 500; }
  .stat-divider { width: 1px; height: 28px; background: var(--border); }
  .last-updated { margin-left: auto; font-size: 12px; color: var(--muted); }

  .main { max-width: 1100px; margin: 0 auto; padding: 28px 32px 60px; }
  .controls { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; align-items: center; }
  .filter-select { padding: 9px 14px; border: 1.5px solid var(--border); border-radius: 8px; background: var(--white); font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--ink); outline: none; cursor: pointer; transition: border-color 0.2s; }
  .filter-select:focus { border-color: var(--gold); }
  .search-input { padding: 9px 14px; border: 1.5px solid var(--border); border-radius: 8px; background: var(--white); font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--ink); outline: none; flex: 1; min-width: 180px; transition: border-color 0.2s; }
  .search-input:focus { border-color: var(--gold); }
  .btn-export { padding: 9px 20px; background: var(--accent); color: var(--white); border: none; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; transition: opacity 0.2s; margin-left: auto; }
  .btn-export:hover { opacity: 0.85; }

  .table-wrap { background: var(--white); border: 1px solid var(--border); border-radius: 12px; box-shadow: var(--shadow); overflow: hidden; }
  .table-scroll { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; min-width: 960px; }
  thead { background: var(--ink); }
  th { padding: 12px 14px; text-align: left; font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: rgba(255,255,255,0.7); white-space: nowrap; }
  tbody tr { border-bottom: 1px solid var(--cream-dark); transition: background 0.15s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--cream); }
  td { padding: 11px 14px; font-size: 13px; color: var(--ink); vertical-align: top; line-height: 1.4; }
  .badge { display: inline-block; padding: 2px 9px; border-radius: 12px; font-size: 11px; font-weight: 600; letter-spacing: 0.04em; }
  .badge-owner { background: #e8f5e9; color: #2d5a3d; }
  .badge-tenant { background: #fff3e0; color: #8b5e00; }

  .state-box { padding: 60px 20px; text-align: center; color: var(--muted); font-size: 14px; }
  .state-icon { font-size: 40px; margin-bottom: 12px; }
  .state-spinner { width: 36px; height: 36px; border: 3px solid var(--cream-dark); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .table-footer { padding: 12px 16px; border-top: 1px solid var(--cream-dark); font-size: 12px; color: var(--muted); background: var(--cream); }

  @media(max-width:700px) { .header-inner,.main,.stats-inner { padding-left:16px; padding-right:16px; } }
</style>
</head>

<script>
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzs1S6fzC_6RMyzZZV3Mh_KwLh_Z9hVs416PD2DNBG2tMCiqsegWHCIHgzchfVtt0SL/exec';
  const ADMIN_PASSWORD = 'PFOWA@2026';
  const SESSION_KEY = 'pfowa_admin_session';

  let allEntries = [];
  let attempts = 0;
  let lockoutUntil = 0;

  function unlock() {
    const now = Date.now();
    if (now < lockoutUntil) {
      const secs = Math.ceil((lockoutUntil - now) / 1000);
      showLockError(`Too many attempts. Try again in ${secs}s.`); return;
    }
    const pw = document.getElementById('pwInput').value;
    if (pw === ADMIN_PASSWORD) {
      sessionStorage.setItem(SESSION_KEY, '1');
      document.getElementById('lockScreen').style.display = 'none';
      document.getElementById('dashboard').classList.add('show');
      loadData();
    } else {
      attempts++;
      const inp = document.getElementById('pwInput');
      inp.classList.add('shake'); setTimeout(() => inp.classList.remove('shake'), 400); inp.value = '';
      if (attempts >= 5) {
        lockoutUntil = Date.now() + 60000;
        showLockError('Too many failed attempts. Locked for 60 seconds.');
        document.getElementById('attemptsNote').textContent = '';
      } else {
        showLockError('Incorrect password. Please try again.');
        document.getElementById('attemptsNote').textContent = `${5 - attempts} attempt(s) remaining before lockout.`;
      }
    }
  }

  function showLockError(msg) {
    const el = document.getElementById('lockError');
    el.textContent = msg; el.classList.add('show');
  }

  function logout() {
    sessionStorage.removeItem(SESSION_KEY);
    document.getElementById('dashboard').classList.remove('show');
    document.getElementById('lockScreen').style.display = 'flex';
    document.getElementById('pwInput').value = '';
    document.getElementById('lockError').classList.remove('show');
  }

  async function loadData() {
    document.getElementById('tableBody').innerHTML =
      '<tr><td colspan="14"><div class="state-box"><div class="state-spinner"></div><p>Fetching latest data…</p></div></td></tr>';
    document.getElementById('lastUpdated').textContent = '';

    try {
      const res = await fetch(SCRIPT_URL);
      const rows = await res.json();
      // First row is headers, rest are data
      const headers = rows[0];
      allEntries = rows.slice(1).map(r => ({
        ts: r[0], block: r[1], flat: r[2], type: r[3], name: r[4],
        phone: r[5], email: r[6], whatsapp: r[7],
        coownerName: r[8], coownerPhone: r[9],
        ownerName: r[10], ownerPhone: r[11], ownerEmail: r[12]
      }));

      document.getElementById('statTotal').textContent = allEntries.length;
      document.getElementById('statOwners').textContent = allEntries.filter(e => e.type === 'owner').length;
      document.getElementById('statTenants').textContent = allEntries.filter(e => e.type === 'tenant').length;
      document.getElementById('statCoowners').textContent = allEntries.filter(e => e.coownerName).length;
      document.getElementById('lastUpdated').textContent = 'Last refreshed: ' + new Date().toLocaleTimeString('en-IN');
      renderTable();
    } catch(err) {
      document.getElementById('tableBody').innerHTML =
        '<tr><td colspan="14"><div class="state-box"><div class="state-icon">⚠️</div><p>Failed to load data. Check your internet connection and try refreshing.</p></div></td></tr>';
    }
  }

  function renderTable() {
    const block = document.getElementById('filterBlock').value;
    const type = document.getElementById('filterType').value;
    const search = document.getElementById('searchInput').value.toLowerCase();

    const filtered = allEntries.filter(e => {
      if (block && e.block !== block) return false;
      if (type && e.type !== type) return false;
      if (search) {
        const hay = [e.name,e.flat,e.phone,e.email,e.ownerName,e.coownerName].join(' ').toLowerCase();
        if (!hay.includes(search)) return false;
      }
      return true;
    });

    const tbody = document.getElementById('tableBody');
    if (!filtered.length) {
      tbody.innerHTML = `<tr><td colspan="14"><div class="state-box"><div class="state-icon">📭</div>
        <p>No entries found${allEntries.length ? ' matching your filters.' : ' yet.'}</p></div></td></tr>`;
    } else {
      tbody.innerHTML = filtered.map((e,i) => `
        <tr>
          <td style="color:#7a7060;font-size:12px;">${i+1}</td>
          <td><strong>${e.block||''}</strong></td>
          <td>${e.flat||''}</td>
          <td><span class="badge badge-${e.type}">${e.type==='owner'?'Owner':'Tenant'}</span></td>
          <td>${e.name||''}</td>
          <td style="white-space:nowrap;">${e.phone||''}</td>
          <td style="font-size:12px;">${e.email||''}</td>
          <td style="font-size:12px;">${e.whatsapp||'—'}</td>
          <td style="font-size:12px;">${e.coownerName||'—'}</td>
          <td style="white-space:nowrap;font-size:12px;">${e.coownerPhone||'—'}</td>
          <td style="font-size:12px;">${e.ownerName||'—'}</td>
          <td style="white-space:nowrap;font-size:12px;">${e.ownerPhone||'—'}</td>
          <td style="font-size:12px;">${e.ownerEmail||'—'}</td>
          <td style="font-size:12px;white-space:nowrap;">${e.ts||'—'}</td>
        </tr>`).join('');
    }
    document.getElementById('tableFooter').textContent =
      filtered.length === allEntries.length
        ? `Showing all ${allEntries.length} entr${allEntries.length===1?'y':'ies'}`
        : `Showing ${filtered.length} of ${allEntries.length} entries`;
  }

  function exportCSV() {
    const headers = ['#','Block','Flat No','Type','Resident Name','Phone','Email','WhatsApp',
      'Co-owner Name','Co-owner Phone','Owner Name','Owner Phone','Owner Email','Submitted'];
    const rows = allEntries.map((e,i) => [
      i+1, e.block, e.flat, e.type, e.name, e.phone, e.email, e.whatsapp,
      e.coownerName||'', e.coownerPhone||'',
      e.ownerName||'', e.ownerPhone||'', e.ownerEmail||'', e.ts||''
    ]);
    const csv = [headers,...rows].map(r=>r.map(v=>`"${String(v||'').replace(/"/g,'""')}"`).join(',')).join('\n');
    const a = document.createElement('a');
    a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
    a.download = 'PFOWA_Resident_Data_' + new Date().toISOString().slice(0,10) + '.csv';
    a.click();
  }

  if (sessionStorage.getItem(SESSION_KEY) === '1') {
    document.getElementById('lockScreen').style.display = 'none';
    document.getElementById('dashboard').classList.add('show');
    loadData();
  }
</script>
</body>
</html>
